<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>[SB-01] 시술 상세 — SMILE LASIK · 스토리보드 샘플</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{--blue:#1B59FA;--ink:#000F2C;--sub:#2B3858;--mute:#6A7896;--line:#E5E7EC;--bg:#F7F8FA;--mark:#ff2d78}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Pretendard,-apple-system,system-ui,sans-serif;line-height:1.6}
  .top{background:#fff;border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:20}
  .tag{background:#eef3ff;color:var(--blue);font-weight:800;font-size:13px;border-radius:8px;padding:4px 10px}
  .top h1{font-size:18px;font-weight:800;margin:0}
  .top .hint{margin-left:auto;font-size:12px;color:var(--mute)}
  .stage{display:grid;grid-template-columns:1.55fr 1fr;gap:0;align-items:start}
  @media(max-width:900px){.stage{grid-template-columns:1fr}}
  .canvas{padding:22px;border-right:1px solid var(--line)}
  .frame{position:relative;border:3px solid var(--mark);border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 8px 30px rgba(15,23,42,.08)}
  .frame img{display:block;width:100%;height:auto}
  .marker{position:absolute;transform:translate(-50%,-50%);background:var(--mark);color:#fff;font-size:11.5px;font-weight:800;border-radius:7px;padding:2px 7px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3);z-index:2}
  .marker.dim{opacity:.28}
  .panel{padding:22px 22px 90px}
  .panel h2{font-size:15px;font-weight:800;color:var(--sub);margin:0 0 4px}
  .panel .sub{font-size:12.5px;color:var(--mute);margin:0 0 16px}
  .cardlist{display:grid;gap:9px}
  .row{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;scroll-margin-top:70px}
  .row.hl{border-color:var(--mark);box-shadow:0 0 0 3px rgba(255,45,120,.12)}
  .pill{background:var(--mark);color:#fff;font-size:11px;font-weight:800;border-radius:6px;padding:2px 7px;flex-shrink:0;margin-top:1px}
  .row .txt{font-size:13px;color:var(--ink)}
  .row .txt b{color:var(--ink)}
  .row .txt code{background:#eef1f6;border-radius:4px;padding:0 5px;font-size:11.5px;font-family:ui-monospace,Menlo,monospace;color:var(--sub)}
  .coord{position:fixed;right:14px;bottom:14px;background:#0f172a;color:#8fe3b0;font-size:12px;font-family:ui-monospace,Menlo,monospace;padding:8px 12px;border-radius:8px;z-index:30;opacity:.92;max-width:340px}
  .coord b{color:#fff}
</style>
</head>
<body>
  <div class="top">
    <span class="tag" id="tag">SB-01</span>
    <h1 id="title"></h1>
    <span class="hint">💡 설명 카드에 마우스를 올리면 해당 마커가 강조됩니다 · 이미지 클릭 → 좌표 복사</span>
  </div>
  <div class="stage">
    <div class="canvas"><div class="frame" id="frame"><img id="shot" alt="화면 캡처" /></div></div>
    <div class="panel">
      <h2 id="p-title"></h2>
      <p class="sub" id="p-sub"></p>
      <div class="cardlist" id="cards"></div>
    </div>
  </div>
  <div class="coord" id="coord">클릭 좌표 대기…</div>

<script>
const SCREEN = {
  id: "SB-01",
  title: "시술 상세 — SMILE LASIK (관심담기 · 예약 진입 통합)",
  image: "screens/treatment-detail--desktop.png",
  panelTitle: "이 화면의 핵심 동작 / 데이터",
  panelSub: "라우트 /treatments/:id · 데이터는 어드민 CMS(시술) 항목에서 연동. 모든 텍스트는 {en,ko} 이중언어(tx).",
  markers: [
    { n: "1-1",  x: 7,  y: 4.7, text: "<b>뒤로가기</b> — ‘← All treatments’, 목록(<code>/treatments</code>)으로 복귀" },
    { n: "1-2",  x: 15, y: 8.6, text: "<b>히어로</b> — 카테고리 배지·병원명·시술명. hero 이미지 위 다크 그라디언트 (<code>dept·hospital.name·name</code>)" },
    { n: "1-3",  x: 11, y: 15.5, text: "<b>Overview</b> — 요약·체류기간·위치 (<code>summary·duration·hospital.city</code>)" },
    { n: "1-4",  x: 25, y: 25,  text: "<b>Before / After</b> — 비포·애프터 이미지 + 회복기간 라벨. <code>before/after</code> 없으면 섹션 hide(검진 등)" },
    { n: "1-5",  x: 10, y: 34.5, text: "<b>What’s included</b> — 포함 내역 2열 리스트 (<code>includes[]</code>)" },
    { n: "1-6",  x: 17, y: 43.5, text: "<b>Options</b> — ‘pick N’ 선택 그룹 + 옵션 칩 (<code>options[].group·pick·items</code>)" },
    { n: "1-7",  x: 11, y: 50,  text: "<b>How the day(s) flow</b> — 진행 단계, 번호 자동 (<code>steps[]</code>)" },
    { n: "1-8",  x: 13, y: 62,  text: "<b>Prepare before you arrive</b> — 방문 전 준비(빨간 불릿) (<code>prepare[]</code>)" },
    { n: "1-9",  x: 38, y: 62,  text: "<b>Good to know</b> — 공통 안내 3항목. 시술 데이터 아님, 언어별 고정 상수(<code>NOTICES</code>)" },
    { n: "1-10", x: 12, y: 70,  text: "<b>Other treatments</b> — 연관 시술: 같은 병원 우선, 없으면 임의 3건 (어드민 실데이터 연동 시 병원 시술로 대체)" },
    { n: "1-11", x: 74, y: 18,  text: "<b>YOUR RATE</b> — 정가(취소선)·SafeDoc가·할인율·KRW 병기(당일 환율 mock) (<code>listPrice·price·usd()</code>)" },
    { n: "1-12", x: 80, y: 23,  text: "<b>Bookings 수량</b> — 예약 필요 인원수 입력(−/+), 최소 1 (<code>qty</code>)" },
    { n: "1-13", x: 80, y: 27,  text: "<b>Save / Book</b> — 관심담기(<code>store.addToCart(id,qty)</code>) / 예약 신청 진입" },
    { n: "1-14", x: 79, y: 33.3, text: "<b>Performed at</b> — 시술 병원 카드, 클릭 시 병원 상세(<code>/providers/:id</code>) 연결 지점" },
    { n: "1-15", x: 93.5, y: 40, text: "<b>문의 플로팅</b> — 전 화면 상시 노출(상담 모달)" },
  ],
};

const $ = (s) => document.querySelector(s);
$("#tag").textContent = SCREEN.id;
$("#title").textContent = SCREEN.title;
$("#p-title").textContent = SCREEN.panelTitle;
$("#p-sub").textContent = SCREEN.panelSub;
$("#shot").src = SCREEN.image;
const frame = $("#frame"), cards = $("#cards");
SCREEN.markers.forEach((m) => {
  const mk = document.createElement("div");
  mk.className = "marker"; mk.textContent = m.n; mk.dataset.n = m.n;
  mk.style.left = m.x + "%"; mk.style.top = m.y + "%";
  frame.appendChild(mk);
  const row = document.createElement("div");
  row.className = "row"; row.dataset.n = m.n;
  row.innerHTML = `<span class="pill">${m.n}</span><span class="txt">${m.text}</span>`;
  row.addEventListener("mouseenter", () => hi(m.n, true));
  row.addEventListener("mouseleave", () => hi(m.n, false));
  cards.appendChild(row);
});
function hi(n, on){
  document.querySelectorAll(".marker").forEach((m) => m.classList.toggle("dim", on && m.dataset.n !== n));
  document.querySelectorAll(".row").forEach((r) => r.classList.toggle("hl", on && r.dataset.n === n));
}
$("#shot").addEventListener("click", (e) => {
  const r = e.target.getBoundingClientRect();
  const x = (((e.clientX - r.left) / r.width) * 100).toFixed(1);
  const y = (((e.clientY - r.top) / r.height) * 100).toFixed(1);
  const snip = `{ n: "", x: ${x}, y: ${y}, text: "" },`;
  $("#coord").innerHTML = `복사됨 → <b>${snip}</b>`;
  navigator.clipboard && navigator.clipboard.writeText(snip).catch(()=>{});
});
</script>
</body>
</html>
