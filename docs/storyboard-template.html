<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>스토리보드 — 화면 기획 (Figma 대용)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{--blue:#1B59FA;--ink:#000F2C;--sub:#2B3858;--mute:#6A7896;--line:#E5E7EC;--bg:#F7F8FA;--mark:#ff2d78}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:Pretendard,-apple-system,system-ui,sans-serif;line-height:1.6}
  .top{background:#fff;border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:20}
  .tag{background:#eef3ff;color:var(--blue);font-weight:800;font-size:13px;border-radius:8px;padding:4px 10px}
  .top h1{font-size:18px;font-weight:800;margin:0}
  .top .hint{margin-left:auto;font-size:12px;color:var(--mute)}
  .top select{font-size:13px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit}
  .stage{display:grid;grid-template-columns:1.5fr 1fr;gap:0;align-items:start}
  @media(max-width:900px){.stage{grid-template-columns:1fr}}
  .canvas{padding:22px;border-right:1px solid var(--line)}
  .frame{position:relative;border:3px solid var(--mark);border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 8px 30px rgba(15,23,42,.08)}
  .frame img{display:block;width:100%;height:auto}
  .marker{position:absolute;transform:translate(-50%,-50%);background:var(--mark);color:#fff;
    font-size:12px;font-weight:800;border-radius:7px;padding:2px 8px;white-space:nowrap;
    box-shadow:0 2px 6px rgba(0,0,0,.25);cursor:default;z-index:2}
  .marker.dim{opacity:.35}
  .panel{padding:22px 22px 80px}
  .panel h2{font-size:15px;font-weight:800;color:var(--sub);margin:0 0 4px}
  .panel .sub{font-size:12.5px;color:var(--mute);margin:0 0 16px}
  .cardlist{display:grid;gap:10px}
  .row{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border:1px solid var(--line);
    border-radius:10px;background:#fff}
  .row:target,.row.hl{border-color:var(--mark);box-shadow:0 0 0 3px rgba(255,45,120,.12)}
  .pill{background:var(--mark);color:#fff;font-size:11.5px;font-weight:800;border-radius:6px;
    padding:2px 8px;flex-shrink:0;margin-top:1px}
  .row .txt{font-size:13.5px;color:var(--ink)}
  .row .txt b{color:var(--ink)}
  .empty{color:var(--mute);font-size:13px;padding:12px}
  .coord{position:fixed;right:14px;bottom:14px;background:#0f172a;color:#8fe3b0;font-size:12px;
    font-family:ui-monospace,Menlo,monospace;padding:8px 12px;border-radius:8px;z-index:30;opacity:.9;max-width:340px}
  .coord b{color:#fff}
</style>
</head>
<body>
  <div class="top">
    <span class="tag" id="tag">SB-01</span>
    <h1 id="title">화면 제목</h1>
    <label class="hint">스크린 전환
      <select id="picker"></select>
    </label>
    <span class="hint">💡 이미지를 <b>클릭</b>하면 그 위치의 마커 좌표가 콘솔+클립보드로 복사됩니다</span>
  </div>

  <div class="stage">
    <div class="canvas">
      <div class="frame" id="frame">
        <img id="shot" alt="화면 캡처" />
        <!-- 마커는 JS 가 그림 -->
      </div>
    </div>
    <div class="panel">
      <h2 id="p-title">추가 영역의 핵심 동작</h2>
      <p class="sub" id="p-sub"></p>
      <div class="cardlist" id="cards"></div>
    </div>
  </div>
  <div class="coord" id="coord">클릭 좌표 대기…</div>

<script>
/* =======================================================================
   ✏️ 여기만 편집하세요. (스샷은 docs/screens/ 의 파일명)
   - 화면을 여러 개 넣으려면 SCREENS 배열에 객체를 추가
   - markers[].x, y 는 이미지 기준 %(좌상단 0,0). 이미지 클릭 → 좌표 자동 복사
   - 하나의 marker 가 [이미지 위 마커] + [우측 설명 카드] 를 동시에 만든다
   ======================================================================= */
const SCREENS = [
  {
    id: "SB-01",
    title: "예약/시술 예시 — 화면 캡처 위 마커 데모",
    image: "screens/treatments--desktop.png",   // ← 캡처 파일 교체
    panelTitle: "이 화면의 핵심 동작",
    panelSub: "각 마커(N-M)는 이미지 위 위치와 오른쪽 설명이 1:1 매칭됩니다.",
    markers: [
      { n: "1-1", x: 20, y: 14, text: "상단 네비게이션 — 전 화면 공통 헤더" },
      { n: "1-2", x: 28, y: 47, text: "카테고리 필터 — 진료과 기준 시술 필터링" },
      { n: "1-3", x: 20, y: 66, text: "시술 카드 — 병원명·시술명·요약·가격·관심담기" },
    ],
  },
  // { id:"SB-02", title:"...", image:"screens/providers--desktop.png", markers:[...] },
];

/* ---- 렌더링 (아래는 손댈 필요 없음) ---- */
const $ = (s) => document.querySelector(s);
let cur = 0;

function render(i) {
  const s = SCREENS[i]; cur = i;
  $("#tag").textContent = s.id || "SB";
  $("#title").textContent = s.title || "";
  $("#p-title").textContent = s.panelTitle || "핵심 동작";
  $("#p-sub").textContent = s.panelSub || "";
  $("#shot").src = s.image;
  // 마커 재생성
  const frame = $("#frame");
  frame.querySelectorAll(".marker").forEach((m) => m.remove());
  const cards = $("#cards"); cards.innerHTML = "";
  (s.markers || []).forEach((m) => {
    const mk = document.createElement("div");
    mk.className = "marker"; mk.textContent = m.n;
    mk.style.left = m.x + "%"; mk.style.top = m.y + "%";
    mk.dataset.n = m.n;
    frame.appendChild(mk);
    const row = document.createElement("div");
    row.className = "row"; row.id = "row-" + m.n; row.dataset.n = m.n;
    row.innerHTML = `<span class="pill">${m.n}</span><span class="txt">${m.text || ""}</span>`;
    row.addEventListener("mouseenter", () => hi(m.n, true));
    row.addEventListener("mouseleave", () => hi(m.n, false));
    cards.appendChild(row);
  });
  if (!(s.markers || []).length) cards.innerHTML = '<div class="empty">마커가 없습니다. SCREENS[].markers 에 추가하세요.</div>';
}
function hi(n, on) {
  document.querySelectorAll(".marker").forEach((m) => m.classList.toggle("dim", on && m.dataset.n !== n));
  const row = document.getElementById("row-" + n); if (row) row.classList.toggle("hl", on);
}

// 스크린 선택기
const picker = $("#picker");
SCREENS.forEach((s, i) => { const o = document.createElement("option"); o.value = i; o.textContent = `${s.id} · ${s.title}`; picker.appendChild(o); });
picker.addEventListener("change", (e) => render(+e.target.value));

// 클릭 → 좌표 복사(마커 배치 도우미)
$("#shot").addEventListener("click", (e) => {
  const r = e.target.getBoundingClientRect();
  const x = (((e.clientX - r.left) / r.width) * 100).toFixed(1);
  const y = (((e.clientY - r.top) / r.height) * 100).toFixed(1);
  const snippet = `{ n: "", x: ${x}, y: ${y}, text: "" },`;
  $("#coord").innerHTML = `복사됨 → <b>${snippet}</b>`;
  navigator.clipboard && navigator.clipboard.writeText(snippet).catch(() => {});
  console.log(snippet);
});

render(0);
</script>
</body>
</html>
