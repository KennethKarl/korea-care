function svcRecScore(s){const d=svcDetail(s.id);const h=HOSPITALS.find(x=>x.id===s.hospital);const pop=(d.popularity||3)/5;const rat=((h&&h.rating)||4.5)/5;const rev=Math.min(((h&&h.reviews)||0)/2000,1);return 0.55*pop+0.30*rat+0.15*rev;}

{id:'premium-checkup-cost-seoul',category:'checkup',readMinutes:5,published:'2026-04-15',

function t(k){const e=T[k];if(!e)return k;return e[state.lang]||e.en||k;}

const STORAGE='safedoc_demo_v1';
const defaultState=()=>({lang:'en',persona:'us_individual',signedIn:false,profile:null,bookings:{},couponCode:null,conflictChoice:null,cart:[]});
let state=loadState();
function loadState(){try{const r=localStorage.getItem(STORAGE);if(!r)return defaultState();const s=Object.assign(defaultState(),JSON.parse(r));if(!Array.isArray(s.cart))s.cart=[];return s;}catch(e){return defaultState();}}
function saveState(){try{localStorage.setItem(STORAGE,JSON.stringify(state));}catch(e){}}
function resetDemo(){state=defaultState();saveState();toast(t('toast_reset'));go('#/');}

function inCart(serviceId){return state.cart.some(i=>i.serviceId===serviceId);}
function addToCart(serviceId){if(inCart(serviceId)){toast(t('cart_already_in'));return false;}const s=SERVICES.find(x=>x.id===serviceId);if(!s)return false;state.cart.push({serviceId,hospitalId:s.hospital,visitDate:'',addedAt:Date.now()});saveState();toast(t('cart_added'));return true;}
function removeFromCart(serviceId){state.cart=state.cart.filter(i=>i.serviceId!==serviceId);saveState();toast(t('cart_removed'));}
function setCartDate(serviceId,date){const it=state.cart.find(i=>i.serviceId===serviceId);if(it){it.visitDate=date;saveState();}}
function clearCart(){state.cart=[];saveState();}
function cartGroups(){const g={};for(const it of state.cart){const k=it.hospitalId+'|'+(it.visitDate||'');if(!g[k])g[k]={key:k,hospitalId:it.hospitalId,visitDate:it.visitDate||'',items:[]};g[k].items.push(it);}return Object.values(g);}
function cartReadyGroups(){return cartGroups().filter(g=>!!g.visitDate);}
function cartReservationCount(){return cartReadyGroups().length;}
function effectiveUser(){const p=PERSONAS[state.persona];if(!state.signedIn)return null;return state.profile||{name:p.name,email:p.email,citizenship:p.citizenship,enterprise:p.enterprise,enterpriseStatus:p.enterpriseStatus};}

function computePrice(s,u,cc,pick){
  const tier=(u&&u.citizenship==='KR')?'KR_RESIDENT':'FOREIGNER';
  const base=tier==='KR_RESIDENT'?s.kr_price:s.fx_price;
  let entDiscount=0;
  if(u&&u.enterprise&&u.enterpriseStatus==='verified'){
    const e=ENTERPRISES[u.enterprise];
    if(e&&e.discounts[s.dept])entDiscount=Math.round(base*(e.discounts[s.dept]/100));
  }
  let couponDiscount=0,conflict=false,chosen=null;
  const c=cc?COUPONS[cc]:null;
  if(c){
    const amt=c.pct?Math.round(base*c.pct/100):c.amount;
    if(entDiscount>0&&!c.stackable){conflict=true;chosen=pick||'enterprise';if(chosen==='enterprise')couponDiscount=0;else{entDiscount=0;couponDiscount=amt;}}
    else couponDiscount=amt;
  }
  return{tier,base,entDiscount,couponDiscount,total:Math.max(0,base-entDiscount-couponDiscount),conflict,chosen};
}
function fmtUsd(n){return '$'+Number(n).toLocaleString('en-US',{maximumFractionDigits:0});}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m){const s=document.getElementById('toast-slot');const d=document.createElement('div');d.className='toast pop-in';d.textContent=m;s.innerHTML='';s.appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transform='translateX(-50%) translateY(8px)';},2400);setTimeout(()=>{if(d.parentNode)d.parentNode.removeChild(d);},2800);}
function parseHash(){const h=(location.hash||'#/').slice(1);const[p,q]=h.split('?');const params={};if(q)q.split('&').forEach(kv=>{const[k,v]=kv.split('=');if(k)params[decodeURIComponent(k)]=decodeURIComponent(v||'');});return{path:p,segs:p.split('/').filter(Boolean),params};}
function go(p){location.hash=p;}

function icon(n,size=20,sw=1.75){const w=b=>`<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="${n==='chevron-down'?'chev':''}">${b}</svg>`;switch(n){
case 'chevron-down':return w('<polyline points="6 9 12 15 18 9"/>');
case 'chevron-right':return w('<polyline points="9 6 15 12 9 18"/>');
case 'arrow-right':return w('<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>');
case 'arrow-left':return w('<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>');
case 'check':return w('<polyline points="20 6 9 17 4 12"/>');
case 'star':return w('<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>');
case 'shield':return w('<path d="M12 2l9 4v6c0 5-3.5 9-9 10-5.5-1-9-5-9-10V6l9-4z"/>');
case 'globe':return w('<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 010 20M12 2a15 15 0 000 20"/>');
case 'sparkle':return w('<path d="M12 2l2 7 7 2-7 2-2 7-2-7-7-2 7-2z"/>');

function viewServices(params){
  const did=params.dept||'';
  const concern=params.concern||'';
  const price=params.price||'';
  const defaultSort=did==='screen'?'price_asc':'recommended';
  const sort=params.sort||defaultSort;
  const u=previewUserFromState();
  const hospitalOptions=did?HOSPITALS.filter(h=>SERVICES.some(s=>s.hospital===h.id&&s.dept===did)):HOSPITALS;
  const rawHid=params.hospital||'';
  const hid=rawHid&&hospitalOptions.some(h=>h.id===rawHid)?rawHid:'';
  let list=SERVICES.slice();
  if(did)list=list.filter(s=>s.dept===did);
  if(hid)list=list.filter(s=>s.hospital===hid);
  if(did&&concern&&CONCERN_ORDER[did])list=list.filter(s=>svcConcern(s)===concern);
  if(price&&PRICE_RANGES[price]){const[lo,hi]=PRICE_RANGES[price];list=list.filter(s=>{const t=computePrice(s,u).total;return t>=lo&&t<=hi;});}
  if(sort==='recommended')list.sort((a,b)=>svcRecScore(b)-svcRecScore(a));
  else if(sort==='popular')list.sort((a,b)=>(svcDetail(b.id).popularity||0)-(svcDetail(a.id).popularity||0));
  else if(sort==='price_asc')list.sort((a,b)=>computePrice(a,u).total-computePrice(b,u).total);
  else if(sort==='price_desc')list.sort((a,b)=>computePrice(b,u).total-computePrice(a,u).total);
  else if(sort==='duration')list.sort((a,b)=>(a.duration_en||'').length-(b.duration_en||'').length);
  const grouped=GROUPED_DEPTS.includes(did)&&list.length>0;
  const groups=grouped?(()=>{const order=PROCEDURE_ORDER[did]||[];const buckets={};for(const s of list){const k=svcProcedure(s);(buckets[k]=buckets[k]||[]).push(s);}const keys=Object.keys(buckets).sort((a,b)=>{const ia=order.indexOf(a),ib=order.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});return keys.map(k=>({key:k,items:buckets[k]}));})():null;
  const qs=(over)=>{const o=Object.assign({dept:did,hospital:hid,concern,price,sort:sort===defaultSort?'':sort},over);const p=Object.entries(o).filter(([k,v])=>v).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');return '#/services'+(p?'?'+p:'');};
  return `<section class="max-w-wide mx-auto px-4 md:px-6 pt-12 pb-16">
    <a href="#/" class="text-ink-muted hover:text-ink inline-flex items-center gap-1 text-[13px] font-medium">${icon('arrow-left',14,2.2)} ${t('back')}</a>
    <h1 class="text-[36px] md:text-[44px] font-semibold tracking-tight mt-4">${t('nav_browse')}</h1>
    <p class="text-ink-muted mt-2 max-w-[60ch]">${t('services_sub')}</p>
    ${browseSubnav('treatments')}
    <div class="mt-6 flex items-start justify-between gap-6 flex-wrap">

function viewCart(){

    return `<section class="max-w-narrow mx-auto px-4 md:px-6 py-20 text-center">
      <div class="mx-auto w-14 h-14 rounded-full bg-paper-muted flex items-center justify-center text-ink-muted">${icon('cart',24)}</div>

      <p class="text-ink-muted mt-2">${t('cart_empty_s')}</p>
      <a href="#/services" class="inline-flex items-center gap-2 mt-6 px-5 py-3 rounded-full bg-brand-600 text-white font-semibold">${t('cart_browse')} ${icon('arrow-right',16,2.2)}</a>
    </section>`;
  }

                    <div class="text-[12px] text-ink-muted mt-0.5 truncate">${esc(hn(h))}</div>
                  </div>
                  <button type="button" data-cart-remove="${s.id}" class="shrink-0 text-ink-muted hover:text-danger-700 inline-flex items-center gap-1 text-[12px] font-medium">${icon('trash',14,2)} ${t('cart_remove')}</button>
                </div>

function render(){
  document.documentElement.lang=state.lang;
  const v=document.getElementById('view');
  v.classList.remove('fade-in');void v.offsetWidth;v.classList.add('fade-in');
  const{segs,params}=parseHash();
  let html='';
  switch(segs[0]){
    case undefined:case 'home':html=viewLanding();break;
    case 'procedures':
    case 'departments':html=viewDepartments();break;
    case 'hospitals':html=viewHospitals(params);break;
    case 'hospital':html=viewHospital(segs,params);break;
    case 'providers':html=segs[1]?viewProvider(segs):viewProviders(params);break;
    case 'reviews':html=viewReviews(params);break;
    case 'before-after':html=segs[1]?viewBeforeAfterDetail(segs):viewBeforeAfterList(params);break;
    case 'blog':html=segs[1]?viewBlogDetail(segs):viewBlog(params);break;
    case 'qa':html=viewQA(params);break;
    case 'services':html=viewServices(params);break;
    case 'service':html=viewService(segs);break;
    case 'cart':html=viewCart();break;
    case 'checkout':html=viewCheckout();break;
    case 'checkout-done':html=viewCheckoutDone(params);break;
    case 'signin':html=viewSignin(params);break;
    case 'onboarding':html=viewOnboarding(params);break;
    case 'book':html=viewBook(segs);break;
    case 'booking':html=viewBookingStatus(segs);break;
    case 'bookings':html=viewBookings();break;
    default:html=empty();
  }
  v.innerHTML=html;
  document.title='SafeDoc — '+(segs[0]||'Home');
  renderHeader();renderFooter();renderPersonaPanel();wirePage();
  if(location.hash.includes('#/#')){const a=location.hash.split('#/#')[1];setTimeout(()=>document.getElementById(a)?.scrollIntoView({behavior:'smooth'}),0);}else{window.scrollTo({top:0});}
}

let simState={serviceId:'smc-screen-premium',signedIn:true,citizenship:'US',enterprise:null,couponCode:null,conflictChoice:'enterprise'};
function simResetDefault(){simState={serviceId:simState.serviceId,signedIn:true,citizenship:'US',enterprise:null,couponCode:null,conflictChoice:'enterprise'};}
function simUser(){if(!simState.signedIn)return null;return{citizenship:simState.citizenship,enterprise:simState.enterprise?'acme':null,enterpriseStatus:simState.enterprise};}
function simLevel(){if(!simState.signedIn)return 0;if(!simState.enterprise&&!simState.couponCode)return 1;if(simState.enterprise==='verified'&&!simState.couponCode)return 2;if(simState.enterprise==='verified'&&simState.couponCode)return 3;return -1;}
function simApplyLevel(n){const l=Number(n);if(l===0){simState.signedIn=false;simState.couponCode=null;simState.enterprise=null;simState.conflictChoice='enterprise';}
else if(l===1){simState.signedIn=true;simState.enterprise=null;simState.couponCode=null;simState.conflictChoice='enterprise';}
else if(l===2){simState.signedIn=true;simState.enterprise='verified';simState.couponCode=null;simState.conflictChoice='enterprise';}
else if(l===3){simState.signedIn=true;simState.enterprise='verified';simState.couponCode='SAFEDOC10';simState.conflictChoice='enterprise';}}

      ${stepTitle(2,t('sim_auth'))}
      <div class="seg" role="group">
        <button type="button" data-sim="auth" data-val="0" aria-pressed="${!simState.signedIn}">${t('sim_auth_guest')}</button>
        <button type="button" data-sim="auth" data-val="1" aria-pressed="${simState.signedIn}">${t('sim_auth_signedin')}</button>
      </div>
    </div>

    <div class="mt-7 sim-row ${!simState.signedIn?'opacity-40 pointer-events-none':''}">
      ${stepTitle(3,t('sim_enterprise'))}
      <div class="grid grid-cols-3 gap-2">
        <button type="button" data-sim="ent" data-val="none" class="px-2.5 py-2.5 rounded-xl border text-[12px] font-semibold ${simState.enterprise===null?'border-brand-500 bg-brand-50 text-brand-700':'border-paper-edge text-ink-soft hover:border-paper-ring'}">${t('sim_ent_none')}</button>
        <button type="button" data-sim="ent" data-val="pending" class="px-2.5 py-2.5 rounded-xl border text-[12px] font-semibold ${simState.enterprise==='pending'?'border-warning-500 bg-warning-100 text-warning-700':'border-paper-edge text-ink-soft hover:border-paper-ring'}">${t('sim_ent_pending')}</button>
        <button type="button" data-sim="ent" data-val="verified" class="px-2.5 py-2.5 rounded-xl border text-[12px] font-semibold ${simState.enterprise==='verified'?'border-success-500 bg-success-100 text-success-700':'border-paper-edge text-ink-soft hover:border-paper-ring'}">${t('sim_ent_verified')}</button>
      </div>
    </div>

    <div class="mt-7 sim-row ${!simState.signedIn?'opacity-40 pointer-events-none':''}">
      ${stepTitle(4,t('sim_coupon'))}
      <div class="flex items-center gap-2">
        <input id="sim-cp-input" class="field mono uppercase" placeholder="SAFEDOC10" value="${esc(simState.couponCode||'')}"/>
        ${simState.couponCode?`<button type="button" data-sim="cp-remove" class="px-3 py-2 rounded-full bg-paper-muted text-ink-soft text-[13px] font-semibold shrink-0">${t('coupon_remove')}</button>`:`<button type="button" data-sim="cp-apply" class="px-3 py-2 rounded-full bg-ink text-white text-[13px] font-semibold shrink-0">${t('coupon_apply')}</button>`}
      </div>
      <div class="mt-2 flex items-center flex-wrap gap-1.5">
        <span class="text-[11px] text-ink-muted">${t('sim_try_codes')}</span>
        <button type="button" data-sim="cp-set" data-val="SAFEDOC10" class="chip bg-paper-muted text-ink-soft hover:bg-paper-line">SAFEDOC10</button>
        <button type="button" data-sim="cp-set" data-val="NEW200" class="chip bg-paper-muted text-ink-soft hover:bg-paper-line">NEW200</button>
      </div>
    </div>

    <div class="mt-7 pt-5 border-t border-paper-line flex items-center justify-between">
      <button type="button" data-sim="reset" class="text-[13px] font-medium text-ink-muted hover:text-ink">${t('sim_reset')}</button>
      <a href="#/book/${svc.hospital}/${svc.id}" class="text-[13px] font-semibold text-brand-700 hover:text-brand-800 inline-flex items-center gap-1">${t('sim_book_this')} ${icon('arrow-right',13,2.2)}</a>
    </div>`;
}

function renderSimReceipt(){
  const el=document.getElementById('sim-receipt');if(!el)return;
  const svc=SERVICES.find(s=>s.id===simState.serviceId)||SERVICES[0];
  const h=HOSPITALS.find(x=>x.id===svc.hospital);
  const d=DEPARTMENTS.find(x=>x.id===svc.dept);
  const u=simUser();
  const p=computePrice(svc,u,simState.couponCode,simState.conflictChoice);
  const baseFx=svc.fx_price;
  const guest=!simState.signedIn;
  const saved=Math.max(0,baseFx-p.total);
  const pctPaid=baseFx?Math.max(6,Math.round((p.total/baseFx)*100)):100;
  const pctSaved=baseFx?Math.round((saved/baseFx)*100):0;
  const strike='line-through text-ink-muted/70';
  el.innerHTML=`
    <div class="flex items-start gap-4">
      <div class="photo-tile rounded-xl w-[64px] h-[64px] shrink-0" style="--t1:${h.palette[0]};--t2:${h.palette[1]};--photo:url('${hospImg(h.id)}');"></div>
      <div class="min-w-0 flex-1">
        <div class="text-[11px] uppercase tracking-[0.12em] text-ink-muted font-semibold">${dn(d)}</div>
        <h3 class="text-[17px] font-semibold leading-tight mt-0.5 truncate">${esc(sn(svc))}</h3>
        <div class="text-[12px] text-ink-muted mt-0.5 truncate">${esc(hn(h))}</div>
      </div>
    </div>

    <div class="mt-6">
      <div class="flex items-baseline justify-between mb-1.5">
        <span class="text-[11px] uppercase tracking-[0.12em] font-semibold text-ink-muted">${t('sim_you_pay')}</span>
        ${guest?`<span class="chip bg-paper-muted text-ink-muted font-semibold">${t('sim_guest_locked')}</span>`:(saved>0?`<span class="chip bg-success-100 text-success-700 font-semibold">${t('sim_savings')} ${fmtUsd(saved)} · ${pctSaved}%</span>`:'')}
      </div>
      <div class="sim-bar relative h-2.5 rounded-full bg-paper-muted overflow-hidden">
        ${guest?`<div class="absolute inset-0 opacity-60" style="background:repeating-linear-gradient(45deg,rgba(15,21,32,.08) 0 6px,transparent 6px 12px)"></div>`:`<div class="absolute inset-y-0 left-0 bg-gradient-to-r from-brand-500 to-brand-700" style="width:${pctPaid}%"></div>`}
      </div>
      <div class="flex items-baseline justify-between mt-1.5 text-[11px] text-ink-muted tabular">
        <span>${guest?'—':`${pctPaid}% ${t('sim_of_base')}`}</span>
        <span class="line-through">${fmtUsd(baseFx)}</span>
      </div>
    </div>

    <div class="mt-6">
      <div class="text-[11px] uppercase tracking-[0.12em] font-semibold text-ink-muted mb-2">${t('sim_breakdown')}</div>
      <dl class="space-y-2 text-[14px]">
        <div class="flex items-center justify-between">
          <dt class="text-ink-muted">${t('base_price')} · ${p.tier==='KR_RESIDENT'?t('tier_resident'):t('tier_foreigner')}</dt>
          <dd class="tabular ${guest?strike:''}">${fmtUsd(p.base)}</dd>
        </div>
        ${!guest && p.base!==baseFx?`<div class="flex items-center justify-between text-success-700 pop-in"><dt>${t('tier_foreigner')} → ${t('tier_resident')}</dt><dd class="tabular">−${fmtUsd(baseFx-p.base)}</dd></div>`:''}
        ${!guest && p.entDiscount>0?`<div class="flex items-center justify-between text-success-700 pop-in"><dt>− ${t('enterprise_applied')}</dt><dd class="tabular">−${fmtUsd(p.entDiscount)}</dd></div>`:''}
        ${!guest && p.couponDiscount>0?`<div class="flex items-center justify-between text-success-700 pop-in"><dt>− ${t('coupon_applied')} (${esc(simState.couponCode)})</dt><dd class="tabular">−${fmtUsd(p.couponDiscount)}</dd></div>`:''}
        <div class="flex items-baseline justify-between pt-3 border-t border-paper-line">
          <dt class="font-semibold">${t('estimated_total')}</dt>
          <dd class="text-[26px] font-semibold tabular ${guest?strike:''}">${fmtUsd(p.total)}</dd>
        </div>
      </dl>
    </div>

    ${guest?`<div class="mt-5 p-3.5 rounded-xl bg-info-100 text-info-700 text-[12px] leading-relaxed">${t('sim_guest_note')}</div>`:''}
    ${simState.enterprise==='pending'?`<div class="mt-5 p-3.5 rounded-xl bg-warning-100 text-warning-700 text-[12px] leading-relaxed">${t('sim_ent_pending_note')}</div>`:''}
    ${p.conflict?`<div class="mt-5 p-3.5 rounded-xl bg-warning-100 border border-warning-500 text-warning-700 text-[12px]">
      <div class="font-semibold">${t('sim_conflict_note')}</div>
      <div class="mt-2 flex items-center gap-4">
        <label class="flex items-center gap-1.5 cursor-pointer"><input type="radio" name="sim-conflict" value="enterprise" ${p.chosen==='enterprise'?'checked':''} class="accent-brand-600"/>${t('pick_enterprise')}</label>
        <label class="flex items-center gap-1.5 cursor-pointer"><input type="radio" name="sim-conflict" value="coupon" ${p.chosen==='coupon'?'checked':''} class="accent-brand-600"/>${t('pick_coupon')}</label>
      </div>
    </div>`:''}`;
}

function wireSimulator(){
  if(!document.getElementById('sim-controls'))return;
  const sync=()=>{renderSimControls();renderSimReceipt();wireSimulator();};
  const rng=document.getElementById('sim-range');
  if(rng)rng.addEventListener('input',e=>{simApplyLevel(e.target.value);sync();});
  const svcSel=document.getElementById('sim-svc');
  if(svcSel)svcSel.addEventListener('change',e=>{simState.serviceId=e.target.value;sync();});
  document.querySelectorAll('#sim-controls [data-sim]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.preventDefault();
      const act=btn.dataset.sim,val=btn.dataset.val;
      if(act==='auth'){simState.signedIn=val==='1';if(!simState.signedIn){simState.couponCode=null;simState.enterprise=null;}}
      else if(act==='ent')simState.enterprise=val==='none'?null:val;
      else if(act==='cp-set'){const ci=document.getElementById('sim-cp-input');if(ci)ci.value=val;simState.couponCode=val;simState.conflictChoice='enterprise';}
      else if(act==='cp-apply'){const ci=document.getElementById('sim-cp-input');const code=(ci&&ci.value||'').trim().toUpperCase();if(COUPONS[code]){simState.couponCode=code;simState.conflictChoice='enterprise';}else{toast(t('toast_coupon_bad'));return;}}
      else if(act==='cp-remove'){simState.couponCode=null;simState.conflictChoice='enterprise';}
      else if(act==='reset'){simResetDefault();}
      sync();
    });
  });
  document.querySelectorAll('input[name="sim-conflict"]').forEach(r=>{
    r.addEventListener('change',e=>{simState.conflictChoice=e.target.value;sync();});
  });
}

function renderSim(){renderSimControls();renderSimReceipt();wireSimulator();}

function wirePage(){
  document.querySelectorAll('.signin-btn').forEach(btn=>btn.addEventListener('click',()=>{
    const p=PERSONAS[state.persona];
    state.signedIn=true;
    state.profile={name:p.name,email:p.email,citizenship:p.citizenship,enterprise:p.enterprise,enterpriseStatus:p.enterpriseStatus};
    saveState();
    const next=new URLSearchParams(location.hash.split('?')[1]||'').get('next');
    toast(t('toast_saved'));go(next||'#/onboarding');
  }));
  const onb=document.getElementById('onboarding-form');
  if(onb){
    onb.addEventListener('submit',e=>{
      e.preventDefault();
      const fd=new FormData(onb),code=(fd.get('enterpriseCode')||'').toString().trim().toUpperCase();
      const p=state.profile||{};p.citizenship=fd.get('citizenship');
      if(code==='ACME-2026'){p.enterprise='acme';p.enterpriseStatus=state.profile?.enterpriseStatus||'pending';}
      else{p.enterprise=null;p.enterpriseStatus=null;}
      state.profile=p;saveState();toast(t('toast_saved'));
      const next=new URLSearchParams(location.hash.split('?')[1]||'').get('next')||'#/';
      go(next);
    });
    const vb=document.getElementById('verify-now');
    if(vb)vb.addEventListener('click',()=>{state.profile=Object.assign({},state.profile,{enterpriseStatus:'verified'});saveState();toast(t('toast_ent_verified'));render();});
  }
  const couponApply=document.getElementById('coupon-apply'),couponRemove=document.getElementById('coupon-remove'),couponInput=document.getElementById('coupon-input');
  if(couponApply)couponApply.addEventListener('click',()=>{const c=(couponInput.value||'').trim().toUpperCase();if(COUPONS[c]){state.couponCode=c;state.conflictChoice=null;saveState();toast(t('toast_coupon_ok'));render();}else toast(t('toast_coupon_bad'));});
  if(couponRemove)couponRemove.addEventListener('click',()=>{state.couponCode=null;state.conflictChoice=null;saveState();render();});
  document.querySelectorAll('.conflict-pick').forEach(r=>r.addEventListener('change',e=>{state.conflictChoice=e.target.value;saveState();render();}));
  const bf=document.getElementById('booking-form');
  if(bf){
    bf.addEventListener('submit',e=>{
      e.preventDefault();
      const fd=new FormData(bf);
      if(new Date(fd.get('exitDate'))<=new Date(fd.get('entryDate'))){toast(t('err_dates'));return;}
      const pp=(fd.get('passport')||'').toString();
      if(!/^[A-Za-z0-9]{6,12}$/.test(pp)){toast(t('err_passport'));return;}
      const segs=parseHash().segs,s=SERVICES.find(x=>x.id===segs[2]),u=effectiveUser();
      const price=computePrice(s,u,state.couponCode,state.conflictChoice);
      const id='SFD-'+Math.random().toString(36).slice(2,7).toUpperCase();
      const form={};for(const[k,v]of fd.entries())form[k]=v;
      const ha=!!(form.addon_lodging||form.addon_flight||form.addon_tour);
      state.bookings[id]={id,hospitalId:segs[1],serviceId:segs[2],form,price,status:'waiting',hasAddons:ha,createdAt:Date.now(),coupon:state.couponCode||null};
      state.couponCode=null;state.conflictChoice=null;saveState();
      toast(t('toast_booking_made'));go('#/booking/'+id);
    });
  }
  const sb=document.getElementById('simulate-confirm');
  if(sb)sb.addEventListener('click',()=>{const id=parseHash().segs[1],b=state.bookings[id];if(!b)return;b.status='confirmed';b.confirmedAt=Date.now();saveState();toast(t('toast_hospital_ok'));render();});

  document.querySelectorAll('[data-cart-add]').forEach(btn=>btn.addEventListener('click',e=>{
    e.preventDefault();e.stopPropagation();
    const sid=btn.dataset.cartAdd;if(addToCart(sid))render();
  }));
  document.querySelectorAll('[data-cart-remove]').forEach(btn=>btn.addEventListener('click',e=>{
    e.preventDefault();const sid=btn.dataset.cartRemove;removeFromCart(sid);render();
  }));
  document.querySelectorAll('[data-cart-date]').forEach(inp=>inp.addEventListener('change',e=>{
    setCartDate(inp.dataset.cartDate,inp.value);render();
  }));
  const ssort=document.getElementById('svc-sort');
  if(ssort)ssort.addEventListener('change',e=>{const p=parseHash().params;p.sort=ssort.value;const qs=Object.entries(p).filter(([k,v])=>v).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');go('#/services'+(qs?'?'+qs:''));});
  const shsp=document.getElementById('svc-hospital');
  if(shsp)shsp.addEventListener('change',e=>{const p=parseHash().params;p.hospital=shsp.value;const qs=Object.entries(p).filter(([k,v])=>v).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');go('#/services'+(qs?'?'+qs:''));});

  const submitFilter=(formId,path)=>{const f=document.getElementById(formId);if(!f)return;const apply=()=>{const fd=new FormData(f);const obj={};for(const[k,v]of fd.entries()){if(v!=='')obj[k]=v;}f.querySelectorAll('input[type="checkbox"]').forEach(c=>{if(c.checked)obj[c.name]='1';});const qs=Object.entries(obj).filter(([k,v])=>v).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');go(path+(qs?'?'+qs:''));};f.querySelectorAll('select,input').forEach(el=>el.addEventListener('change',apply));f.addEventListener('submit',e=>{e.preventDefault();apply();});};
  submitFilter('pv-filter','#/providers');
  submitFilter('rv-filter','#/reviews');
  submitFilter('ba-filter','#/before-after');
  const qaForm=document.getElementById('qa-search');
  if(qaForm)qaForm.addEventListener('submit',e=>{e.preventDefault();const q=(document.getElementById('qa-q')||{}).value||'';const tab=parseHash().params.tab||'about';const obj={tab};if(q)obj.q=q;const qs=Object.entries(obj).filter(([k,v])=>v).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');go('#/qa'+(qs?'?'+qs:''));});

  const cf=document.getElementById('checkout-form');
  if(cf){
    cf.addEventListener('submit',e=>{
      e.preventDefault();
      const fd=new FormData(cf);
      if(new Date(fd.get('exitDate'))<=new Date(fd.get('entryDate'))){toast(t('err_dates'));return;}
      const pp=(fd.get('passport')||'').toString();
      if(!/^[A-Za-z0-9]{6,12}$/.test(pp)){toast(t('err_passport'));return;}
      const u=effectiveUser();
      const groups=cartGroups();
      if(groups.some(g=>!g.visitDate)){toast(t('cart_pick_date_first'));go('#/cart');return;}
      const form={};for(const[k,v]of fd.entries())form[k]=v;
      const hasAddons=!!(form.addon_lodging||form.addon_flight||form.addon_tour);
      const newIds=[];
      for(const g of groups){
        const items=g.items.map(it=>{const s=SERVICES.find(x=>x.id===it.serviceId);return {serviceId:s.id,price:computePrice(s,u,state.couponCode,state.conflictChoice)};});
        const grandPrice=items.reduce((a,x)=>({base:a.base+x.price.base,entDiscount:a.entDiscount+x.price.entDiscount,couponDiscount:a.couponDiscount+x.price.couponDiscount,total:a.total+x.price.total,tier:x.price.tier,conflict:false,chosen:null}),{base:0,entDiscount:0,couponDiscount:0,total:0,tier:items[0]?.price.tier||'FOREIGNER',conflict:false,chosen:null});
        const id='SFD-'+Math.random().toString(36).slice(2,7).toUpperCase();
        state.bookings[id]={id,hospitalId:g.hospitalId,visitDate:g.visitDate,items,form:Object.assign({},form,{visitDate:g.visitDate}),price:grandPrice,status:'waiting',hasAddons,createdAt:Date.now(),coupon:state.couponCode||null};
        newIds.push(id);
      }
      clearCart();state.couponCode=null;state.conflictChoice=null;saveState();toast(t('toast_checkout_made'));
      go('#/checkout-done?ids='+encodeURIComponent(newIds.join(',')));
    });
  }

  renderSim();
}

window.addEventListener('hashchange',render);
document.addEventListener('DOMContentLoaded',()=>{document.documentElement.lang=state.lang;if(!location.hash)location.hash='#/';else render();});
</script>
</body>
</html>
