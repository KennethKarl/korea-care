<!doctype html>
<html><head><meta charset="utf-8"><title>shot init</title></head><body>
<script>
  // Temporary same-origin wrapper used only by chrome --headless --screenshot.
  // Sets demo.html localStorage from same-origin JSON file (?f=name) then redirects to ?r=#/route.
  // Deleted at the end of the screenshot batch.
  const params = new URLSearchParams(location.search);
  const f = params.get('f');
  const r = params.get('r') || '#/';
  const lang = params.get('lang') || 'en';
  const finish = (full) => {
    try {
      if (full) {
        localStorage.setItem('safedoc_demo_v1', JSON.stringify(full));
        document.documentElement.lang = full.lang || lang;
      } else {
        localStorage.removeItem('safedoc_demo_v1');
      }
    } catch (e) { console.error('LS err', e); }
    location.replace('./demo.html' + r);
  };
  if (f) {
    fetch('./_shot_states/' + f + '.json', { cache: 'no-store' })
      .then(res => res.json())
      .then(state => {
        const full = Object.assign({
          lang: lang, persona: 'us_individual', signedIn: false,
          profile: null, bookings: {}, couponCode: null,
          conflictChoice: null, cart: []
        }, state);
        finish(full);
      })
      .catch(e => { console.error('fetch err', e); finish(null); });
  } else {
    finish(null);
  }
</script>
<p>Initializing demo state…</p>
</body></html>
